name: QQHash
on:
    schedule:
        - cron: "45 11 * * 0"
    workflow_dispatch:
permissions:
    contents: read
concurrency:
    group: QQHash
    cancel-in-progress: false
jobs:
    qqhash:
        environment: MoegirlPedia
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # main
              with:
                  egress-policy: audit
            - name: 准备 Socket Firewall
              uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f # main
              with:
                  mode: firewall
            - name: 签出
              uses: actions/checkout@1cce3390c2bfda521930d01229c073c7ff920824 # main
              with:
                  path: MoeMoeBots
            - name: 签出 QQHash
              uses: actions/checkout@1cce3390c2bfda521930d01229c073c7ff920824 # main
              with:
                  repository: gui-ying233/QQHash
                  path: QQHash
                  token: ${{ secrets.QQHASH_PAT }}
            - name: 准备 node.js
              uses: actions/setup-node@0355742c943ddb13ca8a6b700f824231caa91e75 # main
              with:
                  node-version: 20
                  check-latest: true
                  cache-dependency-path: MoeMoeBots/pnpm-lock.yaml
            - name: 准备 pnpm
              uses: step-security/action-setup@0ad50dc56a23060fa78b14cfcf0677c4e14b42bc # main
              with:
                  version: 10
                  cache: true
                  cache_dependency_path: MoeMoeBots/pnpm-lock.yaml
            - name: 安装依赖
              run: cd MoeMoeBots && sfw pnpm install --prod
            - name: 准备 Tailscale
              uses: tailscale/github-action@586e48b2b708c2650a83e9e6981a832a59e1119d # main
              with:
                  oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
                  oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
                  tags: tag:ci
                  version: latest
            - name: 运行 QQHash
              env:
                  MOEGIRL_ZH_BOTUSERNAME: ${{ vars.MOEGIRL_ZH_BOTUSERNAME }}
                  MOEGIRL_ZH_BOTPASSWORD: ${{ secrets.MOEGIRL_ZH_BOTPASSWORD }}
                  MOEGIRL_MZH_BOTUSERNAME: ${{ vars.MOEGIRL_MZH_BOTUSERNAME }}
                  MOEGIRL_MZH_BOTPASSWORD: ${{ secrets.MOEGIRL_MZH_BOTPASSWORD }}
                  MOEGIRL_MOEGIRLSSOUSERID: ${{ vars.MOEGIRL_MOEGIRLSSOUSERID }}
                  MOEGIRL_MOEGIRLSSOTOKEN: ${{ secrets.MOEGIRL_MOEGIRLSSOTOKEN }}
                  OTEL_TRACES_EXPORTER: ${{ vars.OTEL_TRACES_EXPORTER }}
                  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
                  OTEL_EXPORTER_OTLP_INSECURE: ${{ vars.OTEL_EXPORTER_OTLP_INSECURE }}
                  OTEL_NODE_RESOURCE_DETECTORS: ${{ vars.OTEL_NODE_RESOURCE_DETECTORS }}
                  OTEL_SERVICE_NAME: ${{ vars.OTEL_SERVICE_NAME }}
              run: cd MoeMoeBots && node -r ./logger.js QQHash
            - name: 提交 QQHash
              run: |
                  cd QQHash
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --staged --quiet || git commit -m "Update QQHash"
                  git push
